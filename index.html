<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#0f0e0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mon Fermier"/>
  <meta name="description" content="Gestion des remises clients - Mon Fermier SARL"/>
  <title>Mon Fermier SARL – Fidélité</title>

  <!-- PWA Manifest inline -->
  <link rel="manifest" href="manifest.json"/>

  <!-- Apple touch icon (inline SVG as data URI) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a4a24'/%3E%3Ctext x='256' y='340' font-size='280' text-anchor='middle'%3E%F0%9F%8C%BE%3C/text%3E%3Ctext x='256' y='460' font-size='60' text-anchor='middle' fill='%23c9a84c' font-family='serif' font-weight='bold'%3EMFS%3C/text%3E%3C/svg%3E"/>

  <!-- React + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    html, body, #root { margin:0; padding:0; height:100%; }
    body { background: #0f0e0b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useState, useEffect, useRef } = React;

const PRODUCTS = [
  { id: 1, name: "Stick 1,5g", price: 100, unit: "stick" },
  { id: 2, name: "Pack 7 sticks 2g Premium", price: 3500, unit: "pack" },
  { id: 3, name: "Pack 25 sticks 2g Premium", price: 12500, unit: "pack" },
  { id: 4, name: "Seau 5kg", price: 22000, unit: "seau" },
  { id: 5, name: "Seau 15kg", price: 65000, unit: "seau" },
];

const POINTS_PER_FRANC = 1000;
const DISCOUNT_THRESHOLD = 50;
const DISCOUNT_RATE = 0.05;
const GIFT = { name: "Pack 7 sticks 2g Premium", value: 3500 };
const STORAGE_KEY = "monfermiersarl_clients";

function generateClientCode() {
  return "CLI-" + Math.random().toString(36).substring(2, 7).toUpperCase();
}
function formatPrice(n) {
  return n.toLocaleString("fr-FR") + " F";
}
function buildTicketText(sale, client) {
  const sep = "================================";
  const sep2 = "--------------------------------";
  let lines = [];
  lines.push(sep);
  lines.push("       MON FERMIER SARL");
  lines.push("   Le savoir-faire agricole");
  lines.push(sep);
  lines.push("Client : " + client.name);
  lines.push("Code   : " + client.code);
  lines.push("Date   : " + sale.date + " a " + sale.time);
  lines.push(sep2);
  sale.items.forEach(it => {
    lines.push(it.qty + "x " + it.name);
    lines.push("   " + it.price.toLocaleString("fr-FR") + " F x" + it.qty + " = " + (it.price * it.qty).toLocaleString("fr-FR") + " F");
  });
  if (sale.giftApplied) lines.push("Cadeau: " + sale.giftName + " (OFFERT)");
  lines.push(sep2);
  lines.push("Sous-total  : " + sale.total.toLocaleString("fr-FR") + " F");
  if (sale.discountApplied) lines.push("Remise -5%  : -" + sale.discount.toLocaleString("fr-FR") + " F");
  lines.push("TOTAL PAYE  : " + sale.final.toLocaleString("fr-FR") + " F");
  lines.push(sep2);
  lines.push("Points gagnes  : +" + sale.earned + " pts");
  lines.push("Solde points   : " + client.points + " pts");
  const remaining = Math.max(0, 50 - client.points);
  if (remaining > 0) lines.push("Pts avant remise: " + remaining + " pts");
  else lines.push("Remise 5% disponible !");
  lines.push(sep);
  lines.push("  Merci pour votre fidelite !");
  lines.push("   A tres bientot chez nous");
  lines.push(sep);
  return lines.join("\n");
}

function App() {
  const [clients, setClients] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : []; }
    catch { return []; }
  });
  const [view, setView] = useState("home");
  const [searchQuery, setSearchQuery] = useState("");
  const [selectedClient, setSelectedClient] = useState(null);
  const [cart, setCart] = useState([]);
  const [newClientName, setNewClientName] = useState("");
  const [newClientPhone, setNewClientPhone] = useState("");
  const [newClientEmail, setNewClientEmail] = useState("");
  const [editForm, setEditForm] = useState({ name: "", phone: "", email: "" });
  const [toast, setToast] = useState(null);
  const [saleResult, setSaleResult] = useState(null);
  const [rewardChoice, setRewardChoice] = useState(null);
  const [clientTab, setClientTab] = useState("profil");

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(clients)); }
    catch(e) { console.warn("Storage error", e); }
  }, [clients]);

  function showToast(msg, type="success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function addClient() {
    if (!newClientName.trim()) return;
    const exists = clients.find(c => c.name.toLowerCase() === newClientName.trim().toLowerCase());
    if (exists) { showToast("Ce client existe deja !", "error"); return; }
    const client = { id: Date.now(), code: generateClientCode(), name: newClientName.trim(), phone: newClientPhone.trim(), email: newClientEmail.trim(), points: 0, totalSpent: 0, history: [] };
    setClients(prev => [...prev, client]);
    setNewClientName(""); setNewClientPhone(""); setNewClientEmail("");
    setSelectedClient(client); setClientTab("profil"); setView("client");
    showToast("Client " + client.name + " cree avec succes !");
  }

  function saveEditClient() {
    if (!editForm.name.trim()) return;
    const updated = { ...selectedClient, name: editForm.name.trim(), phone: editForm.phone.trim(), email: editForm.email.trim() };
    setClients(prev => prev.map(c => c.id === updated.id ? updated : c));
    setSelectedClient(updated); setView("client");
    showToast("Profil mis a jour !");
  }

  function filteredClients() {
    if (!searchQuery.trim()) return clients;
    const q = searchQuery.toLowerCase();
    return clients.filter(c => c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q));
  }

  function openClientSale(client) {
    setSelectedClient(client); setCart([]); setClientTab("profil"); setView("sale");
  }

  function addToCart(product) {
    setCart(prev => {
      const ex = prev.find(i => i.id === product.id);
      if (ex) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...product, qty: 1 }];
    });
  }

  function updateQty(productId, delta) {
    setCart(prev => prev.map(i => i.id === productId ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter(i => i.qty > 0));
  }

  function cartTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }
  function cartPoints() { return Math.floor(cartTotal() / POINTS_PER_FRANC); }
  function hasDiscount(client) { return (client.points + cartPoints()) >= DISCOUNT_THRESHOLD; }
  function discountAmount() { return rewardChoice === "discount" ? Math.floor(cartTotal() * DISCOUNT_RATE) : 0; }
  function finalTotal() { return cartTotal() - discountAmount(); }

  function confirmSale() {
    if (!selectedClient || cart.length === 0) return;
    const total = cartTotal(), earned = cartPoints();
    const eligible = hasDiscount(selectedClient);
    const choiceUsed = eligible ? rewardChoice : null;
    const discount = choiceUsed === "discount" ? Math.floor(total * DISCOUNT_RATE) : 0;
    const giftApplied = choiceUsed === "gift";
    const final = total - discount;
    const sale = {
      date: new Date().toLocaleDateString("fr-FR"),
      time: new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }),
      items: cart.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
      total, earned, discount, final,
      discountApplied: choiceUsed === "discount",
      giftApplied, giftName: giftApplied ? GIFT.name : null,
    };
    let newPoints = selectedClient.points + earned;
    if (choiceUsed) newPoints = Math.max(0, newPoints - DISCOUNT_THRESHOLD);
    const updatedClient = { ...selectedClient, points: newPoints, totalSpent: selectedClient.totalSpent + final, history: [sale, ...selectedClient.history] };
    setClients(prev => prev.map(c => c.id === updatedClient.id ? updatedClient : c));
    setSelectedClient(updatedClient); setSaleResult({ sale, updatedClient });
    setCart([]); setRewardChoice(null); setView("saleResult");
  }

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#1a1813}
    ::-webkit-scrollbar-thumb{background:#c9a84c;border-radius:2px}
    .btn-gold{background:linear-gradient(135deg,#c9a84c,#e8c96a);color:#0f0e0b;border:none;padding:12px 24px;border-radius:4px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all 0.2s;font-size:14px;letter-spacing:.5px}
    .btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,168,76,.4)}
    .btn-outline{background:transparent;color:#c9a84c;border:1px solid #c9a84c44;padding:10px 20px;border-radius:4px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;font-size:13px}
    .btn-outline:hover{border-color:#c9a84c;background:#c9a84c11}
    .btn-ghost{background:transparent;color:#8a8070;border:none;padding:8px 14px;border-radius:4px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;font-size:13px}
    .btn-ghost:hover{color:#e8e0d0;background:#ffffff0a}
    .card{background:#1a1813;border:1px solid #2e2a22;border-radius:8px;padding:20px}
    .input-field{background:#0f0e0b;border:1px solid #2e2a22;color:#e8e0d0;padding:12px 16px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;transition:border-color 0.2s;outline:none}
    .input-field:focus{border-color:#c9a84c66}
    .input-field::placeholder{color:#4a4640}
    .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;letter-spacing:.5px;font-weight:500}
    .tag-gold{background:#c9a84c22;color:#c9a84c;border:1px solid #c9a84c33}
    .tag-green{background:#2d4a2d;color:#7ac97a;border:1px solid #3d6a3d}
    .divider{border:none;border-top:1px solid #2e2a22;margin:16px 0}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1813;border:1px solid #c9a84c44;color:#e8e0d0;padding:12px 24px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1000;animation:slideUp 0.3s ease}
    .toast.error{border-color:#c97a7a44}
    @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .points-bar-bg{background:#0f0e0b;border-radius:20px;height:6px;overflow:hidden}
    .points-bar{background:linear-gradient(90deg,#c9a84c,#e8c96a);height:100%;border-radius:20px;transition:width 0.5s ease}
    .fade-in{animation:fadeIn 0.3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  `;

  return (
    <div style={{ fontFamily:"'Playfair Display',Georgia,serif", minHeight:"100vh", background:"#0f0e0b", color:"#e8e0d0" }}>
      <style>{css}</style>

      {/* HEADER */}
      <div style={{ background:"#14120f", borderBottom:"1px solid #2e2a22", padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", height:64, position:"sticky", top:0, zIndex:100 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, cursor:"pointer" }} onClick={() => { setView("home"); setSearchQuery(""); }}>
          <div style={{ width:40, height:40, background:"linear-gradient(135deg,#1a6b2a,#2d9e42)", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, border:"2px solid #c9a84c" }}>🌾</div>
          <div>
            <div style={{ fontSize:17, fontWeight:700, letterSpacing:.5, lineHeight:1.2 }}>
              <span style={{ color:"#e8e0d0" }}>Mon Fermier </span>
              <span style={{ color:"#c9a84c" }}>SARL</span>
            </div>
            <div style={{ fontSize:10, color:"#4a4640", fontFamily:"'DM Sans',sans-serif", letterSpacing:1 }}>GESTION DES REMISES</div>
          </div>
        </div>
        {view !== "home" && (
          <button className="btn-ghost" onClick={() => {
            if (view === "editClient") setView("client");
            else if (view === "client") { setView("home"); setSearchQuery(""); }
            else { setView("home"); setSearchQuery(""); setCart([]); }
          }}>← {view === "editClient" ? "Profil" : "Accueil"}</button>
        )}
      </div>

      <div style={{ maxWidth:700, margin:"0 auto", padding:"24px 16px" }}>

        {/* ═══ HOME ═══ */}
        {view === "home" && (
          <div className="fade-in">
            <div style={{ position:"relative", borderRadius:16, overflow:"hidden", marginBottom:28, background:"linear-gradient(135deg,#0d2b14 0%,#1a4a24 40%,#0f2d1a 100%)", border:"1px solid #2d5a35", padding:"36px 32px" }}>
              <div style={{ position:"absolute", top:-40, right:-40, width:200, height:200, borderRadius:"50%", background:"radial-gradient(circle,#c9a84c22 0%,transparent 70%)", pointerEvents:"none" }}/>
              <div style={{ position:"relative", zIndex:1 }}>
                <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:16 }}>
                  <div>
                    <div style={{ fontSize:11, color:"#7ac97a", fontFamily:"'DM Sans',sans-serif", letterSpacing:3, marginBottom:8, fontWeight:500 }}>PROGRAMME DE FIDÉLITÉ</div>
                    <h1 style={{ fontSize:28, fontWeight:700, lineHeight:1.2, color:"#fff", marginBottom:6 }}>Bienvenue sur<br/><span style={{ color:"#c9a84c" }}>Mon Fermier SARL</span></h1>
                    <p style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#7a9a7a", maxWidth:300, lineHeight:1.6, marginTop:8 }}>Gérez vos clients, suivez leurs points et accordez des remises automatiquement.</p>
                  </div>
                  <div>
                    <div style={{ fontSize:11, color:"#4a6a4a", fontFamily:"'DM Sans',sans-serif", letterSpacing:2, marginBottom:6 }}>RÈGLE FIDÉLITÉ</div>
                    {[{ icon:"💰", text:"1 000 F = 1 point" }, { icon:"🎯", text:"50 pts → Remise 5% ou 🎁" }, { icon:"♻️", text:"Points remis à zéro après récompense" }].map((r,i) => (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:8, background:"#ffffff0a", borderRadius:8, padding:"6px 12px", marginBottom:4 }}>
                        <span style={{ fontSize:14 }}>{r.icon}</span>
                        <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"#a0c4a0" }}>{r.text}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ marginTop:24, display:"flex", gap:10 }}>
                  <button className="btn-gold" style={{ padding:"12px 28px", fontSize:14, borderRadius:8 }} onClick={() => setView("newClient")}>+ Nouveau client</button>
                  <input className="input-field" style={{ background:"#ffffff0d", border:"1px solid #2d5a35", borderRadius:8 }} placeholder="🔍  Nom ou code client..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}/>
                </div>
              </div>
            </div>

            {/* KPIs */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:28 }}>
              {[
                { label:"Total clients", value:clients.length, icon:"👥", sub:clients.length===0?"Aucun client":`${clients.length} enregistré${clients.length>1?"s":""}`, color:"#3a7bd5", bg:"#1a2a4a" },
                { label:"Remises dispo", value:clients.filter(c=>c.points>=DISCOUNT_THRESHOLD).length, icon:"🏷️", sub:"clients éligibles 5%", color:"#7ac97a", bg:"#1a3a1a" },
                { label:"Chiffre total", value:formatPrice(clients.reduce((s,c)=>s+c.totalSpent,0)), icon:"💵", sub:"revenus cumulés", color:"#c9a84c", bg:"#2a1f0a" },
              ].map((kpi,i) => (
                <div key={i} style={{ background:kpi.bg, border:`1px solid ${kpi.color}33`, borderRadius:12, padding:"18px 16px", position:"relative", overflow:"hidden" }}>
                  <div style={{ position:"absolute", top:-10, right:-10, fontSize:48, opacity:.12 }}>{kpi.icon}</div>
                  <div style={{ fontSize:10, color:"#4a4640", fontFamily:"'DM Sans',sans-serif", letterSpacing:1.5, marginBottom:6, textTransform:"uppercase" }}>{kpi.label}</div>
                  <div style={{ fontSize:typeof kpi.value==="string"?15:26, fontWeight:700, color:kpi.color, lineHeight:1 }}>{kpi.value}</div>
                  <div style={{ fontSize:11, color:"#4a4640", fontFamily:"'DM Sans',sans-serif", marginTop:4 }}>{kpi.sub}</div>
                </div>
              ))}
            </div>

            {/* Client list */}
            {clients.length === 0 ? (
              <div style={{ background:"linear-gradient(135deg,#14120f,#1a1813)", border:"2px dashed #2e2a22", borderRadius:16, textAlign:"center", padding:"56px 24px" }}>
                <div style={{ fontSize:56, marginBottom:16 }}>🌾</div>
                <div style={{ fontSize:18, fontWeight:600, color:"#8a8070", marginBottom:8 }}>Aucun client enregistré</div>
                <div style={{ color:"#4a4640", fontFamily:"'DM Sans',sans-serif", fontSize:13, marginBottom:24 }}>Commencez par ajouter votre premier client fidèle</div>
                <button className="btn-gold" style={{ padding:"12px 32px" }} onClick={() => setView("newClient")}>+ Créer le premier client</button>
              </div>
            ) : (
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                  <h3 style={{ fontSize:13, color:"#8a8070", fontFamily:"'DM Sans',sans-serif", letterSpacing:2 }}>CLIENTS ({filteredClients().length})</h3>
                  {searchQuery && <button className="btn-ghost" style={{ fontSize:12 }} onClick={() => setSearchQuery("")}>✕ Effacer</button>}
                </div>
                {filteredClients().length === 0 ? (
                  <div className="card" style={{ textAlign:"center", color:"#4a4640", fontFamily:"'DM Sans',sans-serif", fontSize:14, padding:32 }}>Aucun résultat pour "{searchQuery}"</div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {filteredClients().map((client) => {
                      const pct = Math.min(100,(client.points/DISCOUNT_THRESHOLD)*100);
                      const eligible = client.points >= DISCOUNT_THRESHOLD;
                      const initials = client.name.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();
                      return (
                        <div key={client.id} style={{ background:eligible?"linear-gradient(135deg,#1a2e1a,#1a1813)":"#1a1813", border:`1px solid ${eligible?"#3d6a3d":"#2e2a22"}`, borderRadius:12, padding:"16px 18px", display:"flex", alignItems:"center", gap:14, cursor:"pointer" }} onClick={() => { setSelectedClient(client); setView("client"); }}>
                          <div style={{ width:44, height:44, borderRadius:"50%", flexShrink:0, background:eligible?"linear-gradient(135deg,#2d6a2d,#3d9a3d)":"linear-gradient(135deg,#2a2520,#3a3028)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:700, color:eligible?"#7ac97a":"#8a8070", border:`2px solid ${eligible?"#3d6a3d":"#2e2a22"}` }}>{initials}</div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6, flexWrap:"wrap" }}>
                              <span style={{ fontWeight:600, fontSize:15, color:"#e8e0d0" }}>{client.name}</span>
                              <span className="tag tag-gold" style={{ fontSize:10 }}>{client.code}</span>
                              {eligible && <span style={{ background:"#1a3d1a", border:"1px solid #3d6a3d", color:"#7ac97a", borderRadius:20, padding:"2px 8px", fontSize:10, fontFamily:"'DM Sans',sans-serif", fontWeight:600 }}>✦ REMISE 5%</span>}
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                              <div className="points-bar-bg" style={{ flex:1 }}>
                                <div className="points-bar" style={{ width:pct+"%", background:eligible?"linear-gradient(90deg,#3d9a3d,#7ac97a)":"linear-gradient(90deg,#c9a84c,#e8c96a)" }}/>
                              </div>
                              <span style={{ fontSize:11, color:eligible?"#7ac97a":"#8a8070", fontFamily:"'DM Sans',sans-serif", whiteSpace:"nowrap" }}>{client.points} / {DISCOUNT_THRESHOLD} pts</span>
                            </div>
                            <div style={{ fontSize:11, color:"#4a4640", fontFamily:"'DM Sans',sans-serif", marginTop:4 }}>{client.history.length} achat{client.history.length>1?"s":""} · {formatPrice(client.totalSpent)}</div>
                          </div>
                          <button className="btn-gold" style={{ padding:"10px 18px", fontSize:13, flexShrink:0, borderRadius:8 }} onClick={e => { e.stopPropagation(); openClientSale(client); }}>Vendre</button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ═══ NEW CLIENT ═══ */}
        {view === "newClient" && (
          <div className="fade-in">
            <h2 style={{ fontSize:22, fontWeight:700, marginBottom:6, color:"#c9a84c" }}>Nouveau Client</h2>
            <p style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#4a4640", marginBottom:24 }}>Renseignez les coordonnées pour mieux fidéliser ce client</p>
            <div className="card" style={{ display:"flex", flexDirection:"column", gap:18 }}>
              <div>
                <label style={{ display:"block", marginBottom:8, fontSize:11, color:"#8a8070", fontFamily:"'DM Sans',sans-serif", letterSpacing:1.5 }}>NOM COMPLET *</label>
                <input className="input-field" placeholder="Ex: Jean Dupont" value={newClientName} onChange={e => setNewClientName(e.target.value)} onKeyDown={e => e.key==="Enter" && addClient()} autoFocus/>
              </div>
              <div>
                <label style={{ display:"block", marginBottom:8, fontSize:11, color:"#8a8070", fontFamily:"'DM Sans',sans-serif", letterSpacing:1.5 }}>📞 TÉLÉPHONE</label>
                <input className="input-field" placeholder="Ex: +225 07 00 00 00" value={newClientPhone} onChange={e => setNewClientPhone(e.target.value)} type="tel"/>

            win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Ticket</title>
            <style>body{font-family:'Courier New',monospace;font-size:13px;padding:20px;background:#fff;color:#000;max-width:320px;margin:0 auto}.row{display:flex;justify-content:space-between;margin:3px 0}.sep{border:none;border-top:1px dashed #aaa;margin:8px 0}.total{font-weight:bold;font-size:15px}.badge{text-align:center;background:#f5f0e8;border:1px solid #c9a84c;border-radius:6px;padding:6px;margin:8px 0;font-size:12px}.footer{text-align:center;font-style:italic;font-size:11px;color:#888;margin-top:12px}@media print{button{display:none}}</style>
            </head><body>
            <div style="text-align:center;margin-bottom:8px"><b style="font-size:16px">🌾 MON FERMIER SARL</b><br/><small>Le savoir-faire agricole</small></div>

            <div class="row"><span>Client :</span><span><b>${updatedClient.name}</b></span></div>
            <div class="row"><span>Code :</span><span>${updatedClient.code}</span></div>
            <div class="row"><span>Date :</span><span>${sale.date} ${sale.time}</span></div>
            <hr class="sep"/>
            ${sale.items.map(it=>`<div class="row"><span>${it.qty}× ${it.name}</span><span>${(it.price*it.qty).toLocaleString('fr-FR')} F</span></div>`).join("")}
            ${sale.giftApplied?`<div class="row" style="color:#b8860b"><span>🎁 ${sale.giftName}</span><span>OFFERT</span></div>`:""}
            <hr class="sep"/>
            <div class="row"><span>Sous-total</span><span>${sale.total.toLocaleString('fr-FR')} F</span></div>
            ${sale.discountApplied?`<div class="row" style="color:green"><span>🏷️ Remise -5%</span><span>-${sale.discount.toLocaleString('fr-FR')} F</span></div>`:""}
            <div class="row total"><span>TOTAL PAYÉ</span><span>${sale.final.toLocaleString('fr-FR')} F</span></div>
            <hr class="sep"/>
            <div class="badge">⭐ +${sale.earned} pts · Solde : <b>${updatedClient.points} pts</b><br/>
            ${updatedClient.points>=50?"✦ Remise 5% disponible !":"Encore "+(50-updatedClient.points)+" pts avant la prochaine remise"}</div>
            <div class="footer">Merci pour votre fidélité !<br/>À très bientôt chez Mon Fermier SARL</div>
            <br/><button onclick="window.print()" style="width:100%;padding:10px;background:#1a6b2a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨️ Imprimer</button>
            </body></html>`);
            win.document.close();
          }

          function shareWhatsApp() {
            const msg = encodeURIComponent(ticketText);
            const phone = updatedClient.phone ? updatedClient.phone.replace(/\D/g,"") : "";
            window.open(phone ? `https://wa.me/${phone}?text=${msg}` : `https://wa.me/?text=${msg}`, "_blank");
          }

          function shareEmail() {
            const subject = encodeURIComponent("Votre ticket d'achat - Mon Fermier SARL");
            const body = encodeURIComponent(ticketText);
            window.open(`mailto:${updatedClient.email||""}?subject=${subject}&body=${body}`, "_blank");
          }

          return (
            <div className="fade-in">
              <div style={{ textAlign:"center", background:"linear-gradient(135deg,#0d2b14,#1a4a24)", border:"1px solid #3d6a3d", borderRadius:16, padding:"28px 20px", marginBottom:16 }}>
                <div style={{ fontSize:52, marginBottom:10 }}>{sale.discountApplied?"🎉":sale.giftApplied?"🎁":"✅"}</div>
                <h2 style={{ fontSize:22, fontWeight:700, color:"#7ac97a", marginBottom:4 }}>Vente enregistrée !</h2>
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:14, color:"#7a9a7a", marginBottom:16 }}>{updatedClient.name} · {sale.date}</div>
                <div style={{ fontSize:36, fontWeight:700, color:"#c9a84c", marginBottom:8 }}>{formatPrice(sale.final)}</div>
                {sale.discountApplied && <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#7ac97a", marginBottom:6 }}>🏷️ Remise -{formatPrice(sale.discount)} appliquée</div>}
                {sale.giftApplied && <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#c9a84c", background:"#2a1f0a", borderRadius:8, padding:"8px 14px", border:"1px solid #c9a84c33", marginBottom:6 }}>🎁 Cadeau : <b>{sale.giftName}</b></div>}
                <div style={{ display:"flex", justifyContent:"center", gap:20, marginTop:12, fontFamily:"'DM Sans',sans-serif", fontSize:13 }}>
                  <span style={{ color:"#4a4640" }}>+<span style={{ color:"#c9a84c", fontWeight:700 }}>{sale.earned}</span> pts</span>
                  <span style={{ color:"#4a4640" }}>Solde : <span style={{ color:"#e8e0d0", fontWeight:700 }}>{updatedClient.points} pts</span></span>
                </div>
              </div>

              <div style={{ background:"#fff", borderRadius:12, padding:"20px 18px", marginBottom:16, color:"#111", fontFamily:"'Courier New',monospace", fontSize:12, border:"2px dashed #c9a84c", position:"relative" }}>
                <div style={{ position:"absolute", top:-10, left:"50%", transform:"translateX(-50%)", background:"#c9a84c", color:"#0f0e0b", fontSize:10, fontWeight:700, padding:"3px 12px", borderRadius:20, fontFamily:"'DM Sans',sans-serif", letterSpacing:1, whiteSpace:"nowrap" }}>APERÇU TICKET</div>
                <div style={{ textAlign:"center", marginBottom:8 }}>
                  <div style={{ fontSize:15, fontWeight:700 }}>🌾 MON FERMIER SARL</div>
                  <div style={{ fontSize:11, color:"#666" }}>Le savoir-faire agricole</div>
                </div>
                <div style={{ borderTop:"1px dashed #ccc", margin:"8px 0" }}/>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}><span>Client :</span><span style={{ fontWeight:700 }}>{updatedClient.name}</span></div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}><span>Code :</span><span>{updatedClient.code}</span></div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}><span>Date :</span><span>{sale.date} {sale.time}</span></div>
                <div style={{ borderTop:"1px dashed #ccc", margin:"8px 0" }}/>
                {sale.items.map((it,i) => <div key={i} style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}><span>{it.qty}× {it.name}</span><span>{(it.price*it.qty).toLocaleString("fr-FR")} F</span></div>)}
                {sale.giftApplied && <div style={{ display:"flex", justifyContent:"space-between", color:"#b8860b", marginBottom:3 }}><span>🎁 {sale.giftName}</span><span>OFFERT</span></div>}
                <div style={{ borderTop:"1px dashed #ccc", margin:"8px 0" }}/>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}><span>Sous-total</span><span>{sale.total.toLocaleString("fr-FR")} F</span></div>
                {sale.discountApplied && <div style={{ display:"flex", justifyContent:"space-between", color:"green", marginBottom:3 }}><span>🏷️ Remise -5%</span><span>-{sale.discount.toLocaleString("fr-FR")} F</span></div>}
                <div style={{ display:"flex", justifyContent:"space-between", fontWeight:700, fontSize:14, marginTop:4 }}><span>TOTAL PAYÉ</span><span>{sale.final.toLocaleString("fr-FR")} F</span></div>
                <div style={{ borderTop:"1px dashed #ccc", margin:"8px 0" }}/>
                <div style={{ background:"#fdf8ec", border:"1px solid #c9a84c55", borderRadius:6, padding:"8px 10px", textAlign:"center", fontSize:11 }}>
                  ⭐ +{sale.earned} pts · Solde : <b>{updatedClient.points} pts</b><br/>
                  <span style={{ color:updatedClient.points>=50?"green":"#888" }}>{updatedClient.points>=50?"✦ Remise 5% disponible !":"Encore "+(50-updatedClient.points)+" pts avant la prochaine remise"}</span>
                </div>
                <div style={{ textAlign:"center", color:"#888", fontSize:10, marginTop:8, fontStyle:"italic" }}>Merci pour votre fidélité !</div>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
                <button className="btn-gold" style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, padding:"14px" }} onClick={printTicket}>🖨️ Imprimer</button>
                <button onClick={shareWhatsApp} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, padding:"14px", background:"linear-gradient(135deg,#128c3e,#25d366)", color:"#fff", border:"none", borderRadius:4, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontWeight:600, fontSize:14 }}>💬 WhatsApp</button>
                <button onClick={shareEmail} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, padding:"14px", background:"#1a2a4a", color:"#7aaad5", border:"1px solid #3a5a9a44", borderRadius:4, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontWeight:500, fontSize:14, gridColumn:"1/-1" }}>✉️ Envoyer par email{updatedClient.email?" ("+updatedClient.email+")":""}</button>
              </div>
              <div style={{ display:"flex", gap:10 }}>
                <button className="btn-gold" style={{ flex:1 }} onClick={() => openClientSale(updatedClient)}>+ Nouvelle vente</button>
                <button className="btn-outline" onClick={() => { setSelectedClient(updatedClient); setClientTab("historique"); setView("client"); }}>Voir historique</button>
              </div>
            </div>
          );
        })()}

      </div>
      {toast && <div className={"toast"+(toast.type==="error"?" error":"")}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
